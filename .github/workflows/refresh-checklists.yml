name: Refresh Security Checklists
# Runs monthly to check for OWASP/CWE updates and creates a PR if sources changed.
on:
  schedule:
    - cron: '0 0 * * 5'  # Every Friday at midnight UTC
  workflow_dispatch:       # Manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Fetch OWASP Top 10 (2021)
        run: |
          curl -sL "https://raw.githubusercontent.com/OWASP/Top10/master/2021/docs/index.md" \
            -o /tmp/owasp-top10-raw.md || echo "⚠️ OWASP fetch failed — using cached version"

      - name: Check for checklist updates needed
        id: check
        run: |
          CHANGED=false
          # Compare fetched OWASP content hash with stored hash
          if [ -f /tmp/owasp-top10-raw.md ]; then
            NEW_HASH=$(sha256sum /tmp/owasp-top10-raw.md | cut -d' ' -f1)
            OLD_HASH=""
            if [ -f .github/extensions/security/.owasp-hash ]; then
              OLD_HASH=$(cat .github/extensions/security/.owasp-hash)
            fi
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              echo "$NEW_HASH" > .github/extensions/security/.owasp-hash
              CHANGED=true
            fi
          fi
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Update timestamp
        if: steps.check.outputs.changed == 'true'
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "Last refreshed: $DATE" > .github/extensions/security/checklists/.last-refresh

      - name: Create PR if changed
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          title: "chore: monthly security checklist refresh"
          body: |
            Automated monthly refresh of security checklist source data.

            - Checked OWASP Top 10 for updates
            - Updated hash tracking file

            This PR was auto-generated by the `refresh-checklists` workflow.
          branch: automation/refresh-checklists
          commit-message: "chore: refresh security checklist hashes"
          labels: automation
